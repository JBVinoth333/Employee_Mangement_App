<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown paths to index with encoded route for SPA restore.
      (function () {
        var segmentCount = 1;
        var l = window.location;
        var repoBase = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        var appPath = l.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~');
        var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';

        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            repoBase +
            '/?/' +
            appPath +
            query +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
